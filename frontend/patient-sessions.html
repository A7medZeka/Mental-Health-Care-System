<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Sessions - Patient Portal</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div class="container-fluid">
        <div class="row">
            
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse bg-white shadow-sm">
                <div class="position-sticky pt-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-heart-pulse-fill text-primary-custom" style="font-size: 2rem;"></i>
                        <h5 class="fw-bold text-primary-custom mt-2">Patient Portal</h5>
                    </div>
                    
                    <ul class="nav flex-column mb-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="patient-dashboard.html">
                                <i class="bi bi-house-door me-2"></i> Home
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="patient-sessions.html">
                                <i class="bi bi-calendar-event me-2"></i> My Sessions
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="patient-wellness.html">
                                <i class="bi bi-flower1 me-2"></i> Wellness & Goals
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4 fade-in">
                
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
                    <h1 class="h2 text-primary-custom fw-bold">My Sessions</h1>
                    <button class="btn btn-outline-primary shadow-sm"><i class="bi bi-plus-circle me-2"></i>Book New Session</button>
                </div>

                <div class="row">
                    <!-- Upcoming Session (UC-13 & UC-15) -->
                    <div class="col-12 mb-4">
                        <div class="card card-custom border-primary">
                            <div class="card-body">
                                <div class="row align-items-center">
                                    <div class="col-md-2 text-center border-end">
                                        <h4 class="fw-bold text-primary-custom mb-0">Today</h4>
                                        <p class="text-secondary-custom mb-0">10:00 AM</p>
                                    </div>
                                    <div class="col-md-6 ps-4">
                                        <h5 class="fw-bold text-dark mb-1">Therapy Session with Dr. Harding</h5>
                                        <p class="text-secondary-custom mb-2"><i class="bi bi-camera-video me-2"></i>Telehealth Video Call</p>
                                        <span class="badge bg-warning text-dark"><i class="bi bi-clock me-1"></i>Starts in 5 minutes</span>
                                    </div>
                                    <div class="col-md-4 text-md-end mt-3 mt-md-0">
                                        <!-- Simulate joining Virtual Waiting Room -->
                                        <button class="btn btn-primary-custom btn-lg w-100" onclick="showToast('You are now in the Virtual Waiting Room. Please wait for Dr. Harding to admit you.', 'success'); this.textContent = 'Waiting for Therapist...'; this.disabled = true; this.classList.replace('btn-primary-custom', 'btn-secondary');">
                                            Join Waiting Room
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Past Sessions -->
                    <div class="col-12">
                        <h5 class="fw-bold text-primary-custom mb-3 mt-2">Past Sessions</h5>
                        <div class="card card-custom">
                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-hover table-custom mb-0">
                                        <thead>
                                            <tr>
                                                <th class="px-4 py-3">Date</th>
                                                <th class="px-4 py-3">Therapist</th>
                                                <th class="px-4 py-3">Type</th>
                                                <th class="px-4 py-3">Status</th>
                                                <th class="px-4 py-3">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr>
                                                <td class="px-4 py-3 fw-semibold">Oct 17, 2026</td>
                                                <td class="px-4 py-3">Dr. Sarah Harding</td>
                                                <td class="px-4 py-3">Initial Consultation</td>
                                                <td class="px-4 py-3"><span class="badge bg-success">Completed</span></td>
                                                <td class="px-4 py-3"><button class="btn btn-sm btn-outline-secondary">View Summary</button></td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>

            </main>
        </div>
    </div>

    <!-- Toast Container -->
    <div aria-live="polite" aria-atomic="true" class="position-relative">
        <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3"></div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/main.js"></script>
    <script src="assets/js/roles.js"></script>
</body>
</html>
